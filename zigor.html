<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff">
  <link rel="manifest" href="/manifest-zigor.json">
  <link rel="apple-touch-icon" href="/icon-180.png">
  <meta name="apple-mobile-web-app-title" content="Fichajes">
  <title>Fichaje – Zigor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:    #185FA5;
      --amber:   #BA7517;
      --green:   #0F6E56;
      --red:     #A32D2D;
      --purple:  #534AB7;
      --blue-bg: #E6F1FB;
      --blue-tx: #0C447C;
      --green-bg:#EAF3DE;
      --green-tx:#27500A;
      --amber-bg:#FAEEDA;
      --amber-tx:#633806;
      --purple-bg:#EEEDFE;
      --purple-tx:#3C3489;
      --border:  #e2e2de;
      --text:    #1a1a18;
      --muted:   #6b6b66;
      --surface: #f7f6f2;
      --white:   #ffffff;
      --radius:  12px;
    }
    html, body { height: 100%; background: var(--surface); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--text); }
    .app { max-width: 420px; margin: 0 auto; padding: 0 1rem 2rem; }
    .header { text-align: center; padding: 1.5rem 0 1rem; }
    .clock { font-size: 44px; font-weight: 300; letter-spacing: -2px; color: var(--text); }
    .fecha { font-size: 14px; color: var(--muted); margin-top: 4px; }
    .nombre { font-size: 20px; font-weight: 600; margin-top: 10px; color: var(--text); }
    .progreso { display: flex; align-items: center; margin: 1.25rem 0; }
    .paso { display: flex; flex-direction: column; align-items: center; flex: 1; }
    .paso-dot { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; border: 1.5px solid var(--border); background: var(--white); color: var(--muted); transition: all .25s; }
    .paso-dot.done  { background: var(--green-bg); border-color: var(--green); color: var(--green-tx); }
    .paso-dot.active{ background: var(--blue-bg);  border-color: var(--blue);  color: var(--blue-tx); }
    .paso-label { font-size: 10px; color: var(--muted); margin-top: 5px; text-align: center; line-height: 1.3; }
    .paso-label.done   { color: var(--green); font-weight: 500; }
    .paso-label.active { color: var(--blue);  font-weight: 500; }
    .linea { flex: 1; height: 1.5px; background: var(--border); margin-top: -15px; transition: background .25s; }
    .linea.done { background: var(--green); }
    .card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.125rem; margin-bottom: .875rem; }
    .card-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .card-titulo { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 14px; }
    .gps-row { display: flex; align-items: center; gap: 8px; background: var(--surface); border-radius: 8px; padding: 9px 12px; margin-bottom: 14px; font-size: 13px; color: var(--muted); }
    .gps-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--border); transition: background .3s; }
    .gps-dot.ok { background: #1D9E75; }
    .gps-dot.buscando { background: #BA7517; animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    .btn-fichar { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; color: #fff; cursor: pointer; transition: opacity .15s, transform .1s; letter-spacing: .01em; }
    .btn-fichar:active { transform: scale(.98); opacity: .9; }
    .btn-fichar:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .btn-entrada   { background: var(--blue); }
    .btn-pausa     { background: var(--amber); }
    .btn-fin-pausa { background: var(--green); }
    .btn-salida    { background: var(--red); }
    .btn-personal { width: 100%; padding: 12px; border-radius: 10px; margin-top: 10px; border: 1.5px solid var(--purple); background: var(--purple-bg); color: var(--purple-tx); font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s, transform .1s; }
    .btn-personal:active { transform: scale(.98); opacity: .9; }
    .btn-personal.en-pausa { background: var(--purple); color: #fff; border-color: var(--purple); }
    .sync-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); margin-top: 10px; justify-content: flex-end; }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); }
    .sync-dot.ok  { background: #1D9E75; }
    .sync-dot.err { background: #E24B4A; }
    .sync-dot.syncing { background: #BA7517; animation: pulse 1s infinite; }
    .section-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin: 1.25rem 0 .625rem; }
    .tl-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .tl-row:last-child { border-bottom: none; }
    .tl-icon { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
    .ic-entrada        { background: var(--blue-bg);   color: var(--blue-tx); }
    .ic-pausa-comida   { background: var(--amber-bg);  color: var(--amber-tx); }
    .ic-fin-comida     { background: var(--green-bg);  color: var(--green-tx); }
    .ic-pausa-personal { background: var(--purple-bg); color: var(--purple-tx); }
    .ic-salida         { background: #FCEBEB; color: #791F1F; }
    .tl-body { flex: 1; }
    .tl-titulo { font-size: 14px; font-weight: 600; color: var(--text); }
    .tl-hora { font-size: 13px; color: var(--muted); margin-top: 1px; }
    .tl-coords { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .resumen { display: grid; gap: 10px; margin-top: 1rem; grid-template-columns: 1fr 1fr; }
    .resumen.tres { grid-template-columns: 1fr 1fr 1fr; }
    .res-card { background: var(--surface); border-radius: 10px; padding: 12px; text-align: center; }
    .res-val { font-size: 20px; font-weight: 600; color: var(--text); }
    .res-lbl { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .jornada-ok { text-align: center; padding: .5rem 0 1rem; }
    .jornada-ok-titulo { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .jornada-ok-sub { font-size: 14px; color: var(--muted); }
    .btn-sec { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--text); font-size: 14px; font-weight: 500; cursor: pointer; margin-top: .625rem; }
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #1a1a18; color: #f7f6f2; padding: 10px 20px; border-radius: 99px; font-size: 14px; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; z-index: 999; }
    .toast.show { opacity: 1; }
    .empty { text-align: center; color: var(--muted); font-size: 14px; padding: 1.25rem 0; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="clock" id="clock">--:--</div>
    <div class="fecha" id="fecha"></div>
    <div class="nombre">Zigor</div>
  </div>

  <div class="progreso">
    <div class="paso"><div class="paso-dot" id="dot0">1</div><div class="paso-label" id="lbl0">Entrada</div></div>
    <div class="linea" id="ln0"></div>
    <div class="paso"><div class="paso-dot" id="dot1">2</div><div class="paso-label" id="lbl1">Pausa<br>comida</div></div>
    <div class="linea" id="ln1"></div>
    <div class="paso"><div class="paso-dot" id="dot2">3</div><div class="paso-label" id="lbl2">Fin<br>pausa</div></div>
    <div class="linea" id="ln2"></div>
    <div class="paso"><div class="paso-dot" id="dot3">4</div><div class="paso-label" id="lbl3">Salida</div></div>
  </div>

  <div class="card" id="card-accion">
    <div class="card-label">Siguiente acción</div>
    <div class="card-titulo" id="accion-titulo">Registrar entrada</div>
    <div class="gps-row">
      <div class="gps-dot" id="gps-dot"></div>
      <span id="gps-texto">Pulsa el botón para fichar</span>
    </div>
    <button class="btn-fichar btn-entrada" id="btn-fichar">Registrar entrada</button>
    <button class="btn-personal" id="btn-personal" style="display:none;">Pausa personal</button>
    <div class="sync-row">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-texto">Sin registros aún</span>
    </div>
  </div>

  <div id="jornada-ok" style="display:none;" class="card jornada-ok">
    <div class="jornada-ok-titulo">Jornada completada</div>
    <div class="jornada-ok-sub">Hasta mañana, Zigor</div>
  </div>

  <div class="section-title">Jornada de hoy</div>
  <div class="card" style="padding: .75rem 1rem;">
    <div class="timeline" id="timeline"><div class="empty">Sin registros aún</div></div>
    <div id="resumen-wrap" style="display:none;">
      <div class="resumen" id="resumen-grid"></div>
    </div>
  </div>

  <button class="btn-sec" id="btn-exportar">Exportar registros CSV</button>
</div>
<div class="toast" id="toast"></div>

<script>
const OPERARIO     = 'Zigor';
const SUPABASE_URL = 'https://yinncmybxzxdkmwjnahu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_u2DKyKiGDSD_r5l3LGUZYA_QKIUx6fu';

const ACCIONES   = ['entrada','inicio_pausa','fin_pausa','salida'];
const LABELS_TIT = ['Registrar entrada','Inicio pausa comida','Fin pausa comida','Registrar salida'];
const LABELS_BTN = ['Registrar entrada','Iniciar pausa comida','Reanudar trabajo','Registrar salida'];
const BTN_CLASES = ['btn-entrada','btn-pausa','btn-fin-pausa','btn-salida'];
const TL_CONFIG  = {
  'entrada':         {clase:'ic-entrada',       letra:'E', nombre:'Entrada'},
  'inicio_pausa':    {clase:'ic-pausa-comida',  letra:'C', nombre:'Inicio pausa comida'},
  'fin_pausa':       {clase:'ic-fin-comida',    letra:'C', nombre:'Fin pausa comida'},
  'salida':          {clase:'ic-salida',         letra:'S', nombre:'Salida'},
  'inicio_personal': {clase:'ic-pausa-personal',letra:'P', nombre:'Inicio pausa personal'},
  'fin_personal':    {clase:'ic-pausa-personal',letra:'P', nombre:'Fin pausa personal'},
};

let paso=0, enPausaPersonal=false, registros=[], pendientes=[], todayKey='';

function pad(n){return String(n).padStart(2,'0');}
function fmtHora(ts){const d=new Date(ts);return pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());}
function fechaKey(){const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function diffMins(a,b){return Math.round((b-a)/60000);}
function fmtMins(m){const h=Math.floor(m/60),mn=m%60;return h>0?h+'h '+mn+'min':mn+'min';}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

function tick(){
  const d=new Date();
  document.getElementById('clock').textContent=pad(d.getHours())+':'+pad(d.getMinutes());
  const dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  document.getElementById('fecha').textContent=dias[d.getDay()]+', '+d.getDate()+' de '+meses[d.getMonth()]+' de '+d.getFullYear();
}

function obtenerGPS(onResult){
  const dot=document.getElementById('gps-dot'),txt=document.getElementById('gps-texto');
  dot.className='gps-dot buscando'; txt.textContent='Obteniendo ubicación...';
  if(!navigator.geolocation){dot.className='gps-dot';txt.textContent='GPS no disponible';onResult(null);return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    const c={lat:parseFloat(pos.coords.latitude.toFixed(5)),lng:parseFloat(pos.coords.longitude.toFixed(5)),acc:Math.round(pos.coords.accuracy)};
    dot.className='gps-dot ok';txt.textContent=c.lat+', '+c.lng+' (±'+c.acc+'m)';onResult(c);
  },err=>{dot.className='gps-dot';txt.textContent='Sin GPS (error '+err.code+')';onResult(null);},{enableHighAccuracy:true,timeout:12000,maximumAge:0});
}

async function enviarSupabase(reg){
  setSyncState('syncing','Sincronizando...');
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/fichajes',{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'return=minimal'},body:JSON.stringify({operario:reg.operario,accion:reg.accion,fecha:reg.fecha,hora:reg.hora,ts:reg.ts,lat:reg.lat||null,lng:reg.lng||null,precision_m:reg.acc||null})});
    if(res.ok||res.status===201){setSyncState('ok','Sincronizado');return true;}
    throw new Error('HTTP '+res.status);
  }catch(e){setSyncState('err','Sin conexión — guardado local');return false;}
}

async function sincronizarPendientes(){
  if(!pendientes.length)return;
  const cola=[...pendientes];
  for(const reg of cola){const ok=await enviarSupabase(reg);if(ok)pendientes=pendientes.filter(p=>p.ts!==reg.ts);}
  guardarLocal();
}

function setSyncState(e,t){document.getElementById('sync-dot').className='sync-dot '+(e||'');document.getElementById('sync-texto').textContent=t;}

function actualizarProgreso(){
  for(let i=0;i<4;i++){
    const d=document.getElementById('dot'+i),l=document.getElementById('lbl'+i);
    if(i<paso){d.className='paso-dot done';l.className='paso-label done';}
    else if(i===paso){d.className='paso-dot active';l.className='paso-label active';}
    else{d.className='paso-dot';l.className='paso-label';}
  }
  for(let i=0;i<3;i++)document.getElementById('ln'+i).className='linea'+(i<paso?' done':'');
}

function actualizarBoton(){
  const cardAc=document.getElementById('card-accion'),jorOk=document.getElementById('jornada-ok'),btnP=document.getElementById('btn-personal');
  if(paso>=4){cardAc.style.display='none';jorOk.style.display='block';return;}
  cardAc.style.display='block';jorOk.style.display='none';
  const btn=document.getElementById('btn-fichar');
  btn.className='btn-fichar '+BTN_CLASES[paso];
  btn.textContent=LABELS_BTN[paso];
  document.getElementById('accion-titulo').textContent=LABELS_TIT[paso];
  // Pausa personal solo cuando está trabajando (entre entrada y pausa comida, o entre fin pausa y salida)
  const puedePersonal=(paso===1||paso===3);
  btnP.style.display=puedePersonal?'block':'none';
  if(puedePersonal){
    btnP.textContent=enPausaPersonal?'Fin pausa personal':'Pausa personal';
    btnP.className='btn-personal'+(enPausaPersonal?' en-pausa':'');
  }
}

function renderTimeline(){
  const el=document.getElementById('timeline'),resWrap=document.getElementById('resumen-wrap');
  const hoy=registros.filter(r=>r.fecha===todayKey);
  if(!hoy.length){el.innerHTML='<div class="empty">Sin registros aún</div>';resWrap.style.display='none';return;}
  el.innerHTML=hoy.map(r=>{
    const cfg=TL_CONFIG[r.accion]||{clase:'ic-entrada',letra:'?',nombre:r.accion};
    return `<div class="tl-row"><div class="tl-icon ${cfg.clase}">${cfg.letra}</div><div class="tl-body"><div class="tl-titulo">${cfg.nombre}</div><div class="tl-hora">${r.hora}</div>${r.lat?`<div class="tl-coords">${r.lat}, ${r.lng} (±${r.acc}m)</div>`:'<div class="tl-coords">Sin ubicación</div>'}</div></div>`;
  }).join('');
  if(hoy.length>=2){
    resWrap.style.display='block';
    const entrada=hoy.find(r=>r.accion==='entrada'),salida=hoy.find(r=>r.accion==='salida');
    const inicioC=hoy.find(r=>r.accion==='inicio_pausa'),finC=hoy.find(r=>r.accion==='fin_pausa');
    const iniciosP=hoy.filter(r=>r.accion==='inicio_personal'),finesP=hoy.filter(r=>r.accion==='fin_personal');
    let pausaC=0,pausaP=0;
    if(inicioC&&finC)pausaC=diffMins(inicioC.ts,finC.ts);
    iniciosP.forEach((ip,i)=>{if(finesP[i])pausaP+=diffMins(ip.ts,finesP[i].ts);});
    let trabajo=0;
    if(entrada&&salida)trabajo=diffMins(entrada.ts,salida.ts)-pausaC-pausaP;
    else if(entrada)trabajo=diffMins(entrada.ts,Date.now())-pausaC-pausaP;
    const grid=document.getElementById('resumen-grid');
    grid.className='resumen'+(pausaP>0?' tres':'');
    grid.innerHTML=`<div class="res-card"><div class="res-val">${trabajo>0?fmtMins(trabajo):'--'}</div><div class="res-lbl">Tiempo trabajado</div></div><div class="res-card"><div class="res-val">${pausaC>0?fmtMins(pausaC):'--'}</div><div class="res-lbl">Pausa comida</div></div>${pausaP>0?`<div class="res-card"><div class="res-val">${fmtMins(pausaP)}</div><div class="res-lbl">Pausa personal</div></div>`:''}`;
  }
}

function registrarFichaje(accion,coords){
  const d=new Date();
  const reg={operario:OPERARIO,accion,fecha:fechaKey(),hora:fmtHora(d.getTime()),ts:d.getTime(),lat:coords?coords.lat:null,lng:coords?coords.lng:null,acc:coords?coords.acc:null};
  registros.push(reg);guardarLocal();renderTimeline();
  const cfg=TL_CONFIG[accion];showToast((cfg?cfg.nombre:accion)+' registrada');
  enviarSupabase(reg).then(ok=>{if(!ok){pendientes.push(reg);guardarLocal();}});
}

function fichar(){
  if(paso>=4)return;
  const btn=document.getElementById('btn-fichar');
  btn.disabled=true;
  const pasoActual=paso;
  obtenerGPS(function(coords){
    registrarFichaje(ACCIONES[pasoActual],coords);
    paso++;guardarLocal();actualizarProgreso();actualizarBoton();
    if(paso<4)btn.disabled=false;
  });
}

function pausaPersonal(){
  const btn=document.getElementById('btn-personal');
  btn.disabled=true;
  obtenerGPS(function(coords){
    registrarFichaje(enPausaPersonal?'fin_personal':'inicio_personal',coords);
    enPausaPersonal=!enPausaPersonal;
    guardarLocal();actualizarBoton();btn.disabled=false;
  });
}

function exportar(){
  let csv='Operario,Acción,Fecha,Hora,Latitud,Longitud,Precisión(m)\n';
  registros.forEach(r=>{const cfg=TL_CONFIG[r.accion];csv+=`${r.operario},${cfg?cfg.nombre:r.accion},${r.fecha},${r.hora},${r.lat||''},${r.lng||''},${r.acc||''}\n`;});
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'}),url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download='fichajes_zigor_'+fechaKey()+'.csv';a.click();URL.revokeObjectURL(url);
}

function guardarLocal(){
  try{
    localStorage.setItem('fich_paso_zigor',String(paso));
    localStorage.setItem('fich_pp_zigor',String(enPausaPersonal));
    localStorage.setItem('fich_registros_zigor',JSON.stringify(registros));
    localStorage.setItem('fich_pendientes_zigor',JSON.stringify(pendientes));
  }catch(e){}
}

function cargarLocal(){
  todayKey=fechaKey();
  try{
    const raw=localStorage.getItem('fich_registros_zigor');if(raw)registros=JSON.parse(raw);
    const rawP=localStorage.getItem('fich_pendientes_zigor');if(rawP)pendientes=JSON.parse(rawP);
    enPausaPersonal=localStorage.getItem('fich_pp_zigor')==='true';
    const hoy=registros.filter(r=>r.fecha===todayKey).filter(r=>ACCIONES.includes(r.accion));
    paso=Math.min(hoy.length,4);
  }catch(e){paso=0;}
  actualizarProgreso();actualizarBoton();renderTimeline();
  if(pendientes.length){setSyncState('err',pendientes.length+' fichaje(s) pendientes');sincronizarPendientes();}
}

tick();setInterval(tick,1000);cargarLocal();
window.addEventListener('online',sincronizarPendientes);
document.getElementById('btn-fichar').addEventListener('click',function(e){e.preventDefault();fichar();},{passive:false});
document.getElementById('btn-personal').addEventListener('click',function(e){e.preventDefault();pausaPersonal();},{passive:false});
document.getElementById('btn-exportar').addEventListener('click',exportar);
</script>
</body>
</html>
