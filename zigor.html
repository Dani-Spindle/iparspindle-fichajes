<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff">
  <title>Fichaje – Zigor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:    #185FA5;
      --amber:   #BA7517;
      --green:   #0F6E56;
      --red:     #A32D2D;
      --blue-bg: #E6F1FB;
      --blue-tx: #0C447C;
      --green-bg:#EAF3DE;
      --green-tx:#27500A;
      --amber-bg:#FAEEDA;
      --amber-tx:#633806;
      --gray-bg: #F1EFE8;
      --gray-tx: #444441;
      --border:  #e2e2de;
      --text:    #1a1a18;
      --muted:   #6b6b66;
      --surface: #f7f6f2;
      --white:   #ffffff;
      --radius:  12px;
    }
    html, body { height: 100%; background: var(--surface); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--text); }
    .app { max-width: 420px; margin: 0 auto; padding: 0 1rem 2rem; }

    /* Header */
    .header { text-align: center; padding: 1.5rem 0 1rem; }
    .clock { font-size: 44px; font-weight: 300; letter-spacing: -2px; color: var(--text); }
    .fecha { font-size: 14px; color: var(--muted); margin-top: 4px; }
    .nombre { font-size: 20px; font-weight: 600; margin-top: 10px; color: var(--text); }

    /* Progreso */
    .progreso { display: flex; align-items: center; margin: 1.25rem 0; }
    .paso { display: flex; flex-direction: column; align-items: center; flex: 1; }
    .paso-dot {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600;
      border: 1.5px solid var(--border);
      background: var(--white); color: var(--muted);
      transition: all .25s;
    }
    .paso-dot.done  { background: var(--green-bg); border-color: var(--green); color: var(--green-tx); }
    .paso-dot.active{ background: var(--blue-bg);  border-color: var(--blue);  color: var(--blue-tx); }
    .paso-label { font-size: 10px; color: var(--muted); margin-top: 5px; text-align: center; line-height: 1.3; }
    .paso-label.done   { color: var(--green); font-weight: 500; }
    .paso-label.active { color: var(--blue);  font-weight: 500; }
    .linea { flex: 1; height: 1.5px; background: var(--border); margin-top: -15px; transition: background .25s; }
    .linea.done { background: var(--green); }

    /* Card acción */
    .card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.125rem; margin-bottom: .875rem;
    }
    .card-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .card-titulo { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 14px; }

    /* GPS */
    .gps-row {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border-radius: 8px;
      padding: 9px 12px; margin-bottom: 14px; font-size: 13px; color: var(--muted);
    }
    .gps-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--border); transition: background .3s; }
    .gps-dot.ok { background: #1D9E75; }
    .gps-dot.buscando { background: #BA7517; animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    /* Botón principal */
    .btn-fichar {
      width: 100%; padding: 15px; border: none; border-radius: 10px;
      font-size: 16px; font-weight: 600; color: #fff; cursor: pointer;
      transition: opacity .15s, transform .1s; letter-spacing: .01em;
    }
    .btn-fichar:active { transform: scale(.98); opacity: .9; }
    .btn-fichar:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .btn-entrada   { background: var(--blue); }
    .btn-pausa     { background: var(--amber); }
    .btn-fin-pausa { background: var(--green); }
    .btn-salida    { background: var(--red); }

    /* Estado sync */
    .sync-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); margin-top: 10px; justify-content: flex-end; }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); }
    .sync-dot.ok  { background: #1D9E75; }
    .sync-dot.err { background: #E24B4A; }
    .sync-dot.syncing { background: #BA7517; animation: pulse 1s infinite; }

    /* Timeline */
    .section-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin: 1.25rem 0 .625rem; }
    .tl-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .tl-row:last-child { border-bottom: none; }
    .tl-icon { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
    .ic-entrada    { background: var(--blue-bg);  color: var(--blue-tx); }
    .ic-pausa      { background: var(--amber-bg); color: var(--amber-tx); }
    .ic-fin-pausa  { background: var(--green-bg); color: var(--green-tx); }
    .ic-salida     { background: #FCEBEB; color: #791F1F; }
    .tl-body { flex: 1; }
    .tl-titulo { font-size: 14px; font-weight: 600; color: var(--text); }
    .tl-hora { font-size: 13px; color: var(--muted); margin-top: 1px; }
    .tl-coords { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* Resumen */
    .resumen { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1rem; }
    .res-card { background: var(--surface); border-radius: 10px; padding: 14px; text-align: center; }
    .res-val { font-size: 22px; font-weight: 600; color: var(--text); }
    .res-lbl { font-size: 12px; color: var(--muted); margin-top: 3px; }

    /* Jornada completa */
    .jornada-ok { text-align: center; padding: .5rem 0 1rem; }
    .jornada-ok-titulo { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .jornada-ok-sub { font-size: 14px; color: var(--muted); }

    /* Botón secundario */
    .btn-sec {
      width: 100%; padding: 12px; border-radius: 10px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text); font-size: 14px; font-weight: 500; cursor: pointer;
      margin-top: .625rem; transition: background .15s;
    }
    .btn-sec:hover { background: var(--surface); }

    /* Toast */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: #1a1a18; color: #f7f6f2; padding: 10px 20px;
      border-radius: 99px; font-size: 14px; opacity: 0;
      transition: opacity .3s; pointer-events: none; white-space: nowrap; z-index: 999;
    }
    .toast.show { opacity: 1; }

    .empty { text-align: center; color: var(--muted); font-size: 14px; padding: 1.25rem 0; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="clock" id="clock">--:--</div>
    <div class="fecha" id="fecha"></div>
    <div class="nombre">Zigor</div>
  </div>

  <!-- Progreso -->
  <div class="progreso">
    <div class="paso">
      <div class="paso-dot" id="dot0">1</div>
      <div class="paso-label" id="lbl0">Entrada</div>
    </div>
    <div class="linea" id="ln0"></div>
    <div class="paso">
      <div class="paso-dot" id="dot1">2</div>
      <div class="paso-label" id="lbl1">Inicio<br>pausa</div>
    </div>
    <div class="linea" id="ln1"></div>
    <div class="paso">
      <div class="paso-dot" id="dot2">3</div>
      <div class="paso-label" id="lbl2">Fin<br>pausa</div>
    </div>
    <div class="linea" id="ln2"></div>
    <div class="paso">
      <div class="paso-dot" id="dot3">4</div>
      <div class="paso-label" id="lbl3">Salida</div>
    </div>
  </div>

  <!-- Card acción -->
  <div class="card" id="card-accion">
    <div class="card-label">Siguiente acción</div>
    <div class="card-titulo" id="accion-titulo">Registrar entrada</div>
    <div class="gps-row">
      <div class="gps-dot buscando" id="gps-dot"></div>
      <span id="gps-texto">Obteniendo ubicación...</span>
    </div>
    <button class="btn-fichar btn-entrada" id="btn-fichar" onclick="fichar()">Registrar entrada</button>
    <div class="sync-row">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-texto">Sin registros aún</span>
    </div>
  </div>

  <!-- Jornada completa -->
  <div id="jornada-ok" style="display:none;" class="card jornada-ok">
    <div class="jornada-ok-titulo">Jornada completada</div>
    <div class="jornada-ok-sub">Hasta mañana, Zigor</div>
  </div>

  <!-- Timeline -->
  <div class="section-title">Jornada de hoy</div>
  <div class="card" style="padding: .75rem 1rem;">
    <div class="timeline" id="timeline">
      <div class="empty">Sin registros aún</div>
    </div>
    <div id="resumen-wrap" style="display:none;">
      <div class="resumen">
        <div class="res-card"><div class="res-val" id="res-trabajo">--</div><div class="res-lbl">Tiempo trabajado</div></div>
        <div class="res-card"><div class="res-val" id="res-pausa">--</div><div class="res-lbl">Pausa comida</div></div>
      </div>
    </div>
  </div>

  <button class="btn-sec" onclick="exportar()">Exportar registros CSV</button>
</div>

<div class="toast" id="toast"></div>

<script>
const OPERARIO   = 'Zigor';
const SUPABASE_URL = 'https://yinncmybxzxdkmwjnahu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_u2DKyKiGDSD_r5l3LGUZYA_QKIUx6fu';

const ACCIONES    = ['entrada','inicio_pausa','fin_pausa','salida'];
const LABELS_TIT  = ['Registrar entrada','Inicio de pausa','Fin de pausa','Registrar salida'];
const LABELS_BTN  = ['Registrar entrada','Iniciar pausa','Reanudar trabajo','Registrar salida'];
const BTN_CLASES  = ['btn-entrada','btn-pausa','btn-fin-pausa','btn-salida'];
const TL_CLASES   = ['ic-entrada','ic-pausa','ic-fin-pausa','ic-salida'];
const TL_LETRAS   = ['E','P','R','S'];
const TL_NOMBRES  = ['Entrada','Inicio pausa','Fin pausa','Salida'];

let paso = 0;
let registros = [];
let gpsCoords = null;
let pendientes = [];
let todayKey = '';

// ── Utilidades ──────────────────────────────────────────────
function pad(n){ return String(n).padStart(2,'0'); }
function fmtHora(ts){ const d=new Date(ts); return pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds()); }
function fmtFecha(ts){ const d=new Date(ts); return pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear(); }
function fechaKey(){ const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function diffMins(a,b){ return Math.round((b-a)/60000); }
function fmtMins(m){ const h=Math.floor(m/60); const mn=m%60; return h>0?h+'h '+mn+'min':mn+'min'; }

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── Reloj ────────────────────────────────────────────────────
function tick(){
  const d=new Date();
  document.getElementById('clock').textContent=pad(d.getHours())+':'+pad(d.getMinutes());
  const dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  document.getElementById('fecha').textContent=dias[d.getDay()]+', '+d.getDate()+' de '+meses[d.getMonth()]+' de '+d.getFullYear();
}

// ── GPS ──────────────────────────────────────────────────────
function iniciarGPS(){
  const dot=document.getElementById('gps-dot');
  const txt=document.getElementById('gps-texto');
  dot.className='gps-dot buscando';
  txt.textContent='Obteniendo ubicación...';
  if(!navigator.geolocation){ dot.className='gps-dot'; txt.textContent='GPS no disponible'; return; }
  navigator.geolocation.getCurrentPosition(pos=>{
    gpsCoords={ lat:parseFloat(pos.coords.latitude.toFixed(5)), lng:parseFloat(pos.coords.longitude.toFixed(5)), acc:Math.round(pos.coords.accuracy) };
    dot.className='gps-dot ok';
    txt.textContent=gpsCoords.lat+', '+gpsCoords.lng+' (±'+gpsCoords.acc+'m)';
  },()=>{
    dot.className='gps-dot'; gpsCoords=null;
    txt.textContent='Sin GPS — se registrará sin ubicación';
  },{enableHighAccuracy:true,timeout:12000,maximumAge:0});
}

// ── Supabase ─────────────────────────────────────────────────
async function enviarSupabase(reg){
  setSyncState('syncing','Sincronizando...');
  try{
    const body={
      operario: reg.operario,
      accion:   reg.accion,
      fecha:    reg.fecha,
      hora:     reg.hora,
      ts:       reg.ts,
      lat:      reg.lat||null,
      lng:      reg.lng||null,
      precision_m: reg.acc||null
    };
    const res=await fetch(SUPABASE_URL+'/rest/v1/fichajes',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization':'Bearer '+SUPABASE_KEY,
        'Prefer':'return=minimal'
      },
      body:JSON.stringify(body)
    });
    if(res.ok||res.status===201){
      setSyncState('ok','Sincronizado');
      return true;
    } else {
      throw new Error('HTTP '+res.status);
    }
  } catch(e){
    setSyncState('err','Sin conexión — guardado local');
    return false;
  }
}

async function sincronizarPendientes(){
  if(pendientes.length===0) return;
  const cola=[...pendientes];
  for(const reg of cola){
    const ok=await enviarSupabase(reg);
    if(ok) pendientes=pendientes.filter(p=>p.ts!==reg.ts);
  }
  guardarLocal();
}

function setSyncState(estado,texto){
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-texto');
  dot.className='sync-dot '+(estado||'');
  txt.textContent=texto;
}

// ── UI: progreso y botón ─────────────────────────────────────
function actualizarProgreso(){
  for(let i=0;i<4;i++){
    const dot=document.getElementById('dot'+i);
    const lbl=document.getElementById('lbl'+i);
    if(i<paso){ dot.className='paso-dot done'; lbl.className='paso-label done'; }
    else if(i===paso){ dot.className='paso-dot active'; lbl.className='paso-label active'; }
    else { dot.className='paso-dot'; lbl.className='paso-label'; }
  }
  for(let i=0;i<3;i++){
    document.getElementById('ln'+i).className='linea'+(i<paso?' done':'');
  }
}

function actualizarBoton(){
  const cardAc=document.getElementById('card-accion');
  const jorOk=document.getElementById('jornada-ok');
  if(paso>=4){
    cardAc.style.display='none';
    jorOk.style.display='block';
    return;
  }
  cardAc.style.display='block';
  jorOk.style.display='none';
  const btn=document.getElementById('btn-fichar');
  btn.className='btn-fichar '+BTN_CLASES[paso];
  btn.textContent=LABELS_BTN[paso];
  document.getElementById('accion-titulo').textContent=LABELS_TIT[paso];
  iniciarGPS();
}

// ── Timeline ─────────────────────────────────────────────────
function renderTimeline(){
  const el=document.getElementById('timeline');
  const resWrap=document.getElementById('resumen-wrap');
  const hoy=registros.filter(r=>r.fecha===todayKey);
  if(hoy.length===0){ el.innerHTML='<div class="empty">Sin registros aún</div>'; resWrap.style.display='none'; return; }
  el.innerHTML=hoy.map(r=>`
    <div class="tl-row">
      <div class="tl-icon ${TL_CLASES[r.paso]}">${TL_LETRAS[r.paso]}</div>
      <div class="tl-body">
        <div class="tl-titulo">${TL_NOMBRES[r.paso]}</div>
        <div class="tl-hora">${r.hora}</div>
        ${r.lat?`<div class="tl-coords">${r.lat}, ${r.lng} (±${r.acc}m)</div>`:'<div class="tl-coords">Sin ubicación</div>'}
      </div>
    </div>
  `).join('');
  if(hoy.length>=2){
    resWrap.style.display='block';
    const entrada=hoy.find(r=>r.paso===0);
    const salida=hoy.find(r=>r.paso===3);
    const inicioP=hoy.find(r=>r.paso===1);
    const finP=hoy.find(r=>r.paso===2);
    let pausaMins=0;
    if(inicioP&&finP) pausaMins=diffMins(inicioP.ts,finP.ts);
    let trabajoMins=0;
    if(entrada&&salida) trabajoMins=diffMins(entrada.ts,salida.ts)-pausaMins;
    else if(entrada) trabajoMins=diffMins(entrada.ts,Date.now())-pausaMins;
    document.getElementById('res-trabajo').textContent=trabajoMins>0?fmtMins(trabajoMins):'--';
    document.getElementById('res-pausa').textContent=pausaMins>0?fmtMins(pausaMins):'--';
  }
}

// ── Fichar ────────────────────────────────────────────────────
async function fichar(){
  if(paso>=4) return;
  const btn=document.getElementById('btn-fichar');
  btn.disabled=true;
  const d=new Date();
  const reg={
    operario: OPERARIO,
    paso:     paso,
    accion:   ACCIONES[paso],
    fecha:    fechaKey(),
    hora:     fmtHora(d.getTime()),
    ts:       d.getTime(),
    lat:      gpsCoords?gpsCoords.lat:null,
    lng:      gpsCoords?gpsCoords.lng:null,
    acc:      gpsCoords?gpsCoords.acc:null
  };
  registros.push(reg);
  paso++;
  guardarLocal();
  actualizarProgreso();
  actualizarBoton();
  renderTimeline();
  showToast(TL_NOMBRES[reg.paso]+' registrada');
  const ok=await enviarSupabase(reg);
  if(!ok){ pendientes.push(reg); guardarLocal(); }
  setTimeout(()=>{ if(btn&&!btn.disabled) btn.disabled=false; },1000);
  if(paso<4) btn.disabled=false;
}

// ── Exportar CSV ─────────────────────────────────────────────
function exportar(){
  let csv='Operario,Acción,Fecha,Hora,Latitud,Longitud,Precisión(m)\n';
  registros.forEach(r=>{
    csv+=`${r.operario},${TL_NOMBRES[r.paso]},${r.fecha},${r.hora},${r.lat||''},${r.lng||''},${r.acc||''}\n`;
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='fichajes_zigor_'+fechaKey()+'.csv'; a.click();
  URL.revokeObjectURL(url);
}

// ── Persistencia local ────────────────────────────────────────
function guardarLocal(){
  try{
    localStorage.setItem('fich_paso_zigor', String(paso));
    localStorage.setItem('fich_registros_zigor', JSON.stringify(registros));
    localStorage.setItem('fich_pendientes_zigor', JSON.stringify(pendientes));
  }catch(e){}
}

function cargarLocal(){
  todayKey=fechaKey();
  try{
    const raw=localStorage.getItem('fich_registros_zigor');
    if(raw) registros=JSON.parse(raw);
    const rawP=localStorage.getItem('fich_pendientes_zigor');
    if(rawP) pendientes=JSON.parse(rawP);
    const hoy=registros.filter(r=>r.fecha===todayKey);
    paso=Math.min(hoy.length,4);
  }catch(e){ paso=0; }
  actualizarProgreso();
  actualizarBoton();
  renderTimeline();
  if(pendientes.length>0){
    setSyncState('err',pendientes.length+' fichaje(s) pendientes de sync');
    sincronizarPendientes();
  }
}

// ── Init ──────────────────────────────────────────────────────
tick();
setInterval(tick,1000);
cargarLocal();
// Intentar sincronizar pendientes al recuperar conexión
window.addEventListener('online', sincronizarPendientes);
</script>
</body>
</html>
