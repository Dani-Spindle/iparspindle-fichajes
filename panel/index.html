<script>
const SUPABASE_URL = 'https://yinncmybxzxdkmwjnahu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlpbm5jbXlieHp4ZGttd2puYWh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MzY5MjEsImV4cCI6MjA5MTIxMjkyMX0.Ry9YwM0KBKU4Sgmeavhki0tCC230OmHXQJGD-3eoh7s';

const IPAR_LAT = 43.27376;
const IPAR_LNG = -2.32873;
const UMBRAL_M = 500;

let allData = [];      // registros raw de Supabase
let diasData = [];     // procesados por (fecha, operario)
let filteredDias = [];
let currentView = 'dias';
let sortCol = 'fecha';
let sortDir = 'desc';

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const p1 = lat1 * Math.PI/180, p2 = lat2 * Math.PI/180;
  const dp = (lat2-lat1)*Math.PI/180, dl = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function lugarFichaje(lat, lng) {
  if (!lat || !lng) return { texto: '—', tipo: 'nd', url: null };
  const dist = haversine(parseFloat(lat), parseFloat(lng), IPAR_LAT, IPAR_LNG);
  if (dist <= UMBRAL_M) return { texto: 'Ipar Spindle', tipo: 'ipar', url: null };
  return { texto: 'Fuera', tipo: 'fuera', url: `https://www.google.com/maps?q=${lat},${lng}` };
}

function horaToMin(h) {
  if (!h) return null;
  const p = h.split(':');
  return parseInt(p[0])*60 + parseInt(p[1]);
}

function minToHHMM(min) {
  if (min === null || min === undefined) return '—';
  const h = Math.floor(Math.abs(min)/60), m = Math.abs(min)%60;
  return `${h}h ${String(m).padStart(2,'0')}m`;
}

function procesarDias(raw) {
  const map = {};
  raw.forEach(r => {
    const key = `${r.fecha}__${r.operario}`;
    if (!map[key]) map[key] = { fecha: r.fecha, operario: r.operario, acciones: {} };
    map[key].acciones[r.accion] = { hora: r.hora, lat: r.lat, lng: r.lng };
  });

  return Object.values(map).map(d => {
    const a = d.acciones;
    const entrada    = a['entrada']       || null;
    const salida     = a['salida']        || null;
    const iniPausa   = a['inicio_pausa']  || null;
    const finPausa   = a['fin_pausa']     || null;

    const mEntrada  = entrada  ? horaToMin(entrada.hora)  : null;
    const mSalida   = salida   ? horaToMin(salida.hora)   : null;
    const mIniPausa = iniPausa ? horaToMin(iniPausa.hora) : null;
    const mFinPausa = finPausa ? horaToMin(finPausa.hora) : null;

    let pausaMin = 0;
    if (mIniPausa !== null && mFinPausa !== null) {
      pausaMin = Math.max(0, mFinPausa - mIniPausa);
    }

    let horasDec = null;
    if (mEntrada !== null && mSalida !== null) {
      horasDec = (mSalida - mEntrada - pausaMin) / 60;
    }

    const avisos = [];
    if (!salida)   avisos.push('Sin salida');
    if (!entrada)  avisos.push('Sin entrada');
    if (iniPausa && !finPausa) avisos.push('Pausa sin cerrar');

    return {
      fecha:      d.fecha,
      operario:   d.operario,
      entrada:    entrada?.hora  || null,
      salida:     salida?.hora   || null,
      ini_pausa:  iniPausa?.hora || null,
      fin_pausa:  finPausa?.hora || null,
      pausa_min:  pausaMin,
      horas_dec:  horasDec,
      avisos,
      lug_entrada:   entrada  ? lugarFichaje(entrada.lat,  entrada.lng)  : null,
      lug_salida:    salida   ? lugarFichaje(salida.lat,   salida.lng)   : null,
      lug_ini_pausa: iniPausa ? lugarFichaje(iniPausa.lat, iniPausa.lng) : null,
      lug_fin_pausa: finPausa ? lugarFichaje(finPausa.lat, finPausa.lng) : null,
    };
  });
}

async function cargarDatos() {
  document.getElementById('tabla-body').innerHTML =
    `<tr><td colspan="8"><div class="status-msg"><span>⏳</span>Cargando...</div></td></tr>`;
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/fichajes?select=*&order=fecha.desc,hora.asc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    if (!res.ok) throw new Error(await res.text());
    allData = await res.json();
    diasData = procesarDias(allData);

    // Poblar select operarios
    const operarios = [...new Set(allData.map(r => r.operario))].sort();
    const sel = document.getElementById('f-operario');
    sel.innerHTML = '<option value="">Todos</option>';
    operarios.forEach(op => {
      const o = document.createElement('option');
      o.value = op; o.textContent = op;
      sel.appendChild(o);
    });

    filtrar();
  } catch(e) {
    document.getElementById('tabla-body').innerHTML =
      `<tr><td colspan="8"><div class="status-msg"><span>⚠️</span>Error al conectar<br><small style="color:var(--red)">${e.message}</small></div></td></tr>`;
  }
}

function filtrar() {
  const fOp     = document.getElementById('f-operario').value;
  const fDesde  = document.getElementById('f-desde').value;
  const fHasta  = document.getElementById('f-hasta').value;
  const fAvisos = document.getElementById('f-avisos').value;

  filteredDias = diasData.filter(d => {
    if (fOp    && d.operario !== fOp) return false;
    if (fDesde && d.fecha < fDesde)   return false;
    if (fHasta && d.fecha > fHasta)   return false;
    if (fAvisos === 'si' && d.avisos.length === 0) return false;
    if (fAvisos === 'no' && d.avisos.length > 0)   return false;
    return true;
  });

  actualizarStats();
  if (currentView === 'dias') renderTabla();
  else renderResumen();
}

function actualizarStats() {
  const totalMin = filteredDias.reduce((a, d) => a + (d.horas_dec ? d.horas_dec*60 : 0), 0);
  const conHoras = filteredDias.filter(d => d.horas_dec !== null);
  const mediaMin = conHoras.length ? totalMin / conHoras.length : 0;
  const avisos   = filteredDias.filter(d => d.avisos.length > 0).length;

  document.getElementById('stat-dias').textContent   = filteredDias.length;
  document.getElementById('stat-horas').textContent  = minToHHMM(Math.round(totalMin));
  document.getElementById('stat-media').textContent  = minToHHMM(Math.round(mediaMin));
  document.getElementById('stat-avisos').textContent = avisos;
}

function sortBy(col) {
  if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  else { sortCol = col; sortDir = 'asc'; }
  filtrar();
}

function lugarHtml(lugar) {
  if (!lugar) return '<span class="lugar-badge lugar-nd">—</span>';
  if (lugar.tipo === 'ipar')  return `<span class="lugar-badge lugar-ipar">Ipar</span>`;
  if (lugar.tipo === 'fuera') return `<a href="${lugar.url}" target="_blank" class="lugar-badge lugar-fuera">Fuera ↗</a>`;
  return '<span class="lugar-badge lugar-nd">—</span>';
}

function renderTabla() {
  const sorted = [...filteredDias].sort((a, b) => {
    let va = a[sortCol] ?? '', vb = b[sortCol] ?? '';
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    return sortDir === 'asc' ? (va < vb ? -1 : va > vb ? 1 : 0) : (va > vb ? -1 : va < vb ? 1 : 0);
  });

  if (!sorted.length) {
    document.getElementById('tabla-body').innerHTML =
      `<tr><td colspan="8"><div class="status-msg"><span>📭</span>No hay datos con estos filtros</div></td></tr>`;
    return;
  }

  document.getElementById('tabla-body').innerHTML = sorted.map(d => {
    const hasAviso = d.avisos.length > 0;
    const fichajes = [
      d.lug_entrada   ? `E:${lugarHtml(d.lug_entrada)}`   : '',
      d.lug_ini_pausa ? `P↓:${lugarHtml(d.lug_ini_pausa)}` : '',
      d.lug_fin_pausa ? `P↑:${lugarHtml(d.lug_fin_pausa)}` : '',
      d.lug_salida    ? `S:${lugarHtml(d.lug_salida)}`    : '',
    ].filter(Boolean).join(' ');

    return `<tr class="${hasAviso ? 'fila-aviso' : ''}">
      <td class="fecha-cell">${d.fecha}</td>
      <td><span class="operario-badge">${d.operario}</span></td>
      <td class="hora-cell">${d.entrada || '—'}</td>
      <td class="hora-cell">${d.salida  || '—'}</td>
      <td class="fecha-cell">${d.pausa_min ? minToHHMM(d.pausa_min) : '—'}</td>
      <td class="horas-cell">${d.horas_dec !== null ? minToHHMM(Math.round(d.horas_dec*60)) : '<span style="color:var(--muted)">—</span>'}</td>
      <td style="font-size:12px">${fichajes}</td>
      <td>
        ${d.avisos.map(a => `<span class="aviso-badge">${a}</span>`).join(' ') || ''}
        <button class="btn-edit" onclick='abrirModalEditar(${JSON.stringify(d)})' title="Editar fichaje">✎ Editar</button>
      </td>
    </tr>`;
  }).join('');
}

function renderResumen() {
  const opMap = {};
  filteredDias.forEach(d => {
    if (!opMap[d.operario]) opMap[d.operario] = { nombre: d.operario, dias: [], totalMin: 0, avisos: 0, fuera: 0 };
    const o = opMap[d.operario];
    o.dias.push(d);
    if (d.horas_dec !== null) o.totalMin += d.horas_dec * 60;
    if (d.avisos.length) o.avisos++;
    [d.lug_entrada, d.lug_salida, d.lug_ini_pausa, d.lug_fin_pausa].forEach(l => {
      if (l && l.tipo === 'fuera') o.fuera++;
    });
  });

  const ops = Object.values(opMap).sort((a,b) => b.totalMin - a.totalMin);
  if (!ops.length) {
    document.getElementById('resumen-grid').innerHTML =
      `<div class="status-msg" style="grid-column:1/-1"><span>📭</span>No hay datos</div>`;
    return;
  }

  const maxMin = Math.max(...ops.flatMap(o => o.dias.map(d => d.horas_dec ? d.horas_dec*60 : 0)));

  document.getElementById('resumen-grid').innerHTML = ops.map(o => {
    const diasConHoras = o.dias.filter(d => d.horas_dec !== null);
    const media = diasConHoras.length ? o.totalMin / diasConHoras.length : 0;

    // Últimos 7 días con datos
    const ultimos = [...o.dias].sort((a,b) => b.fecha.localeCompare(a.fecha)).slice(0, 7).reverse();
    const barras = ultimos.map(d => {
      const min = d.horas_dec ? Math.round(d.horas_dec*60) : 0;
      const pct = maxMin ? (min/maxMin*100) : 0;
      const warn = d.avisos.length > 0;
      return `<div class="chart-bar-wrap">
        <span class="chart-day">${d.fecha.substring(5)}</span>
        <div class="chart-bar-bg"><div class="chart-bar-fill ${warn?'warn':''}" style="width:${pct}%"></div></div>
        <span class="chart-val">${min ? minToHHMM(min) : '⚠'}</span>
      </div>`;
    }).join('');

    return `<div class="operario-card">
      <div class="card-header">
        <div class="card-nombre">${o.nombre}</div>
        <div>
          <div class="card-total">${minToHHMM(Math.round(o.totalMin))}</div>
          <div class="card-total-label">${o.dias.length} días</div>
        </div>
      </div>
      <div class="card-stats">
        <div class="card-stat">
          <div class="card-stat-label">Media diaria</div>
          <div class="card-stat-val">${minToHHMM(Math.round(media))}</div>
        </div>
        <div class="card-stat">
          <div class="card-stat-label">Días completos</div>
          <div class="card-stat-val">${diasConHoras.length}</div>
        </div>
        <div class="card-stat">
          <div class="card-stat-label">Avisos</div>
          <div class="card-stat-val ${o.avisos > 0 ? 'warn' : ''}">${o.avisos}</div>
        </div>
        <div class="card-stat">
          <div class="card-stat-label">Fichajes fuera</div>
          <div class="card-stat-val ${o.fuera > 0 ? 'red' : ''}">${o.fuera}</div>
        </div>
      </div>
      ${barras ? `<div class="card-chart"><div class="chart-label">Últimos días</div>${barras}</div>` : ''}
    </div>`;
  }).join('');
}

function setView(v, btn) {
  currentView = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('content-dias').style.display       = v === 'dias'      ? '' : 'none';
  document.getElementById('content-operarios').style.display  = v === 'operarios' ? '' : 'none';
  filtrar();
}

function limpiarFiltros() {
  ['f-desde','f-hasta'].forEach(id => document.getElementById(id).value = '');
  ['f-operario','f-avisos'].forEach(id => document.getElementById(id).value = '');
  filtrar();
}

function exportarExcel() {
  if (!filteredDias.length) { alert('No hay datos para exportar'); return; }

  // Hoja 1: Detalle por día
  const detalle = filteredDias.map(d => ({
    'Fecha':          d.fecha,
    'Operario':       d.operario,
    'Entrada':        d.entrada  || '',
    'Salida':         d.salida   || '',
    'Inicio pausa':   d.ini_pausa || '',
    'Fin pausa':      d.fin_pausa || '',
    'Pausa':          d.pausa_min ? minToHHMM(d.pausa_min) : '',
    'Horas trabajadas': d.horas_dec !== null ? minToHHMM(Math.round(d.horas_dec*60)) : '',
    'Horas decimales':  d.horas_dec !== null ? d.horas_dec.toFixed(2) : '',
    'Fichaje entrada':  d.lug_entrada  ? d.lug_entrada.texto  : '',
    'Fichaje salida':   d.lug_salida   ? d.lug_salida.texto   : '',
    'Avisos':           d.avisos.join(', '),
  }));

  // Hoja 2: Resumen por operario
  const opMap = {};
  filteredDias.forEach(d => {
    if (!opMap[d.operario]) opMap[d.operario] = { operario: d.operario, totalMin: 0, dias: 0, diasCompletos: 0, avisos: 0, fuera: 0 };
    const o = opMap[d.operario];
    o.dias++;
    if (d.horas_dec !== null) { o.totalMin += d.horas_dec*60; o.diasCompletos++; }
    if (d.avisos.length) o.avisos++;
    [d.lug_entrada, d.lug_salida].forEach(l => { if (l && l.tipo === 'fuera') o.fuera++; });
  });

  const resumen = Object.values(opMap).map(o => ({
    'Operario':         o.operario,
    'Total horas':      minToHHMM(Math.round(o.totalMin)),
    'Horas decimales':  (o.totalMin/60).toFixed(2),
    'Días totales':     o.dias,
    'Días completos':   o.diasCompletos,
    'Días con avisos':  o.avisos,
    'Fichajes fuera':   o.fuera,
  }));

  const wb = XLSX.utils.book_new();
  const ws1 = XLSX.utils.json_to_sheet(detalle);
  ws1['!cols'] = [12,10,8,8,12,12,8,14,14,20,20,25].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws1, 'Detalle por día');

  const ws2 = XLSX.utils.json_to_sheet(resumen);
  ws2['!cols'] = [12,12,14,12,12,14,14].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws2, 'Resumen por operario');

  XLSX.writeFile(wb, `IPAR_Fichajes_${new Date().toISOString().substring(0,10)}.xlsx`);
}

cargarDatos();
</script>

<!-- ════════════════════════════════════════════════════════════
     MODAL FICHAJE MANUAL
════════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-overlay" onclick="cerrarModalSiOverlay(event)">
  <div class="modal" id="modal-fichaje">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-titulo">Nuevo Fichaje Manual</div>
        <div class="modal-subtitle" id="modal-subtitulo">Registra un fichaje que no se realizó desde la app</div>
      </div>
      <button class="modal-close" onclick="cerrarModal()">✕</button>
    </div>
    <div class="modal-body">
      <div id="modal-msg"></div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Operario *</label>
          <select class="form-input" id="m-operario"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Fecha *</label>
          <input type="date" class="form-input" id="m-fecha">
        </div>
      </div>

      <div class="form-section-title">⏰ Horario</div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Entrada</label>
          <input type="time" class="form-input" id="m-entrada" step="1">
        </div>
        <div class="form-group">
          <label class="form-label">Salida</label>
          <input type="time" class="form-input" id="m-salida" step="1">
        </div>
      </div>

      <label class="toggle-pausa">
        <input type="checkbox" id="m-con-pausa" onchange="togglePausa(this.checked)">
        <span>Incluir pausa / descanso</span>
      </label>

      <div id="m-pausa-fields" style="display:none">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Inicio pausa</label>
            <input type="time" class="form-input" id="m-ini-pausa" step="1">
          </div>
          <div class="form-group">
            <label class="form-label">Fin pausa</label>
            <input type="time" class="form-input" id="m-fin-pausa" step="1">
          </div>
        </div>
      </div>

      <div class="form-section-title">📍 Motivo del fichaje manual</div>

      <div class="form-row single">
        <div class="form-group">
          <label class="form-label">Motivo / Nota</label>
          <input type="text" class="form-input" id="m-motivo" placeholder="Ej: Olvidó fichar la salida, trabajó desde oficina externa…">
        </div>
      </div>

      <div id="m-preview" style="display:none;margin-top:10px">
        <div class="form-section-title">👁 Vista previa</div>
        <div id="m-preview-content" style="font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);line-height:1.8"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-save" id="btn-guardar" onclick="guardarFichaje()">
        <span id="btn-guardar-txt">💾 Guardar fichaje</span>
      </button>
    </div>
  </div>
</div>

<script>
// ── Estado del modal ─────────────────────────────────────
let modalMode = 'nuevo'; // 'nuevo' | 'editar'
let modalDiaEditar = null;

function abrirModalNuevo() {
  modalMode = 'nuevo';
  modalDiaEditar = null;
  document.getElementById('modal-titulo').textContent = 'Nuevo Fichaje Manual';
  document.getElementById('modal-subtitulo').textContent = 'Registra un fichaje que no se realizó desde la app';
  document.getElementById('btn-guardar-txt').textContent = '💾 Guardar fichaje';
  resetModal();
  // Fecha por defecto: hoy
  document.getElementById('m-fecha').value = new Date().toISOString().substring(0,10);
  document.getElementById('modal-overlay').classList.add('open');
}

function abrirModalEditar(dia) {
  modalMode = 'editar';
  modalDiaEditar = dia;
  document.getElementById('modal-titulo').textContent = 'Editar Fichaje';
  document.getElementById('modal-subtitulo').textContent = `${dia.operario} · ${dia.fecha}`;
  document.getElementById('btn-guardar-txt').textContent = '✔ Actualizar fichaje';
  resetModal();

  document.getElementById('m-operario').value = dia.operario;
  document.getElementById('m-fecha').value = dia.fecha;
  // Deshabilitar cambiar operario/fecha en edición
  document.getElementById('m-operario').disabled = true;
  document.getElementById('m-fecha').disabled = true;

  if (dia.entrada) document.getElementById('m-entrada').value = dia.entrada.substring(0,5);
  if (dia.salida)  document.getElementById('m-salida').value  = dia.salida.substring(0,5);

  if (dia.ini_pausa || dia.fin_pausa) {
    document.getElementById('m-con-pausa').checked = true;
    togglePausa(true);
    if (dia.ini_pausa) document.getElementById('m-ini-pausa').value = dia.ini_pausa.substring(0,5);
    if (dia.fin_pausa) document.getElementById('m-fin-pausa').value = dia.fin_pausa.substring(0,5);
  }

  calcularPreview();
  document.getElementById('modal-overlay').classList.add('open');
}

function resetModal() {
  document.getElementById('modal-msg').innerHTML = '';
  document.getElementById('m-operario').disabled = false;
  document.getElementById('m-fecha').disabled = false;
  document.getElementById('m-entrada').value = '';
  document.getElementById('m-salida').value = '';
  document.getElementById('m-ini-pausa').value = '';
  document.getElementById('m-fin-pausa').value = '';
  document.getElementById('m-motivo').value = '';
  document.getElementById('m-con-pausa').checked = false;
  document.getElementById('m-pausa-fields').style.display = 'none';
  document.getElementById('m-preview').style.display = 'none';

  // Poblar operarios desde los ya cargados
  const sel = document.getElementById('m-operario');
  const operarios = [...new Set(allData.map(r => r.operario))].sort();
  sel.innerHTML = '<option value="">— Selecciona —</option>';
  operarios.forEach(op => {
    const o = document.createElement('option');
    o.value = op; o.textContent = op;
    sel.appendChild(o);
  });

  // Listeners live para preview
  ['m-entrada','m-salida','m-ini-pausa','m-fin-pausa'].forEach(id => {
    document.getElementById(id).oninput = calcularPreview;
  });
}

function togglePausa(on) {
  document.getElementById('m-pausa-fields').style.display = on ? '' : 'none';
  if (!on) {
    document.getElementById('m-ini-pausa').value = '';
    document.getElementById('m-fin-pausa').value = '';
  }
  calcularPreview();
}

function calcularPreview() {
  const entrada = document.getElementById('m-entrada').value;
  const salida  = document.getElementById('m-salida').value;
  const iniP    = document.getElementById('m-ini-pausa').value;
  const finP    = document.getElementById('m-fin-pausa').value;

  if (!entrada && !salida) {
    document.getElementById('m-preview').style.display = 'none';
    return;
  }

  let lines = [];
  let horasMin = null;
  if (entrada) lines.push(`Entrada: <span style="color:var(--text)">${entrada}</span>`);
  if (salida)  lines.push(`Salida:  <span style="color:var(--text)">${salida}</span>`);
  if (iniP)    lines.push(`Inicio pausa: <span style="color:var(--text)">${iniP}</span>`);
  if (finP)    lines.push(`Fin pausa: <span style="color:var(--text)">${finP}</span>`);

  if (entrada && salida) {
    const mE = horaToMin2(entrada), mS = horaToMin2(salida);
    let pausa = 0;
    if (iniP && finP) pausa = Math.max(0, horaToMin2(finP) - horaToMin2(iniP));
    horasMin = mS - mE - pausa;
    const h = Math.floor(Math.abs(horasMin)/60), m = Math.abs(horasMin)%60;
    const color = horasMin < 0 ? 'var(--red)' : 'var(--green)';
    lines.push(`<strong style="color:${color}">Total: ${h}h ${String(m).padStart(2,'0')}m</strong>`);
  }

  document.getElementById('m-preview-content').innerHTML = lines.join('<br>');
  document.getElementById('m-preview').style.display = '';
}

function horaToMin2(h) {
  const p = h.split(':');
  return parseInt(p[0])*60 + parseInt(p[1]);
}

function cerrarModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
function cerrarModalSiOverlay(e) {
  if (e.target === document.getElementById('modal-overlay')) cerrarModal();
}

function showMsg(tipo, texto) {
  document.getElementById('modal-msg').innerHTML = `<div class="msg-${tipo}">${texto}</div>`;
}

async function guardarFichaje() {
  const operario = document.getElementById('m-operario').value;
  const fecha    = document.getElementById('m-fecha').value;
  const entrada  = document.getElementById('m-entrada').value;
  const salida   = document.getElementById('m-salida').value;
  const iniP     = document.getElementById('m-ini-pausa').value;
  const finP     = document.getElementById('m-fin-pausa').value;
  const motivo   = document.getElementById('m-motivo').value.trim();

  // Validaciones básicas
  if (!operario) { showMsg('error', '⚠ Selecciona un operario.'); return; }
  if (!fecha)    { showMsg('error', '⚠ Indica la fecha.'); return; }
  if (!entrada && !salida) { showMsg('error', '⚠ Debes introducir al menos la entrada o la salida.'); return; }

  const btn = document.getElementById('btn-guardar');
  btn.disabled = true;
  document.getElementById('btn-guardar-txt').textContent = '⏳ Guardando…';
  showMsg('info', 'Guardando cambios en Supabase…');

  try {
    // Construir los registros a insertar/actualizar
    // <input type="time" step="1"> puede devolver "HH:MM" o "HH:MM:SS".
    // Normalizamos siempre a "HH:MM:SS" para no generar "HH:MM:SS:00".
    const normHora = v => {
      const [h = '00', mi = '00', s = '00'] = String(v).split(':');
      return `${h.padStart(2,'0')}:${mi.padStart(2,'0')}:${s.padStart(2,'0')}`;
    };

    const acciones = [];
    if (entrada)  acciones.push({ accion: 'entrada',       hora: normHora(entrada) });
    if (salida)   acciones.push({ accion: 'salida',        hora: normHora(salida) });
    if (iniP)     acciones.push({ accion: 'inicio_pausa',  hora: normHora(iniP) });
    if (finP)     acciones.push({ accion: 'fin_pausa',     hora: normHora(finP) });

    function buildTs(fechaStr, horaStr) {
      const horaNorm = horaStr.length === 5 ? horaStr + ':00' : horaStr;
      const [y, mo, d] = fechaStr.split('-').map(Number);
      const [h, mi, s] = horaNorm.split(':').map(Number);
      return new Date(y, mo - 1, d, h, mi, s || 0).getTime();
    }

    if (modalMode === 'editar') {
      // EDICIÓN: usar PATCH para actualizar solo la hora, sin tocar ts
      // Obtener registros existentes para este (fecha, operario)
      const existRes = await fetch(
        `${SUPABASE_URL}/rest/v1/fichajes?fecha=eq.${fecha}&operario=eq.${encodeURIComponent(operario)}&select=id,accion`,
        { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
      );
      const existentes = await existRes.json();
      const existMap = {};
      (existentes || []).forEach(r => { existMap[r.accion] = r.id; });

      const accionesNecesarias = new Set(acciones.map(a => a.accion));

      // PATCH los que existen, POST los nuevos, DELETE los que ya no hacen falta
      for (const a of acciones) {
        if (existMap[a.accion]) {
          // PATCH solo hora (sin ts para no triggear recálculos)
          const r = await fetch(
            `${SUPABASE_URL}/rest/v1/fichajes?id=eq.${existMap[a.accion]}`,
            { method: 'PATCH', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
              body: JSON.stringify({ hora: a.hora }) }
          );
          if (!r.ok) throw new Error('Error PATCH ' + a.accion + ': ' + await r.text());
        } else {
          // POST nuevo registro
          const r = await fetch(`${SUPABASE_URL}/rest/v1/fichajes`,
            { method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
              body: JSON.stringify({ fecha, operario, accion: a.accion, hora: a.hora, ts: buildTs(fecha, a.hora), lat: IPAR_LAT.toString(), lng: IPAR_LNG.toString() }) }
          );
          if (!r.ok) throw new Error('Error POST ' + a.accion + ': ' + await r.text());
        }
      }
      // Borrar acciones que ya no existen (ej: se quitó la pausa)
      for (const accion of Object.keys(existMap)) {
        if (!accionesNecesarias.has(accion)) {
          await fetch(`${SUPABASE_URL}/rest/v1/fichajes?id=eq.${existMap[accion]}`,
            { method: 'DELETE', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Prefer': 'return=minimal' } }
          );
        }
      }
    } else {
      // NUEVO FICHAJE: insertar con ts
      const payload = acciones.map(a => ({
        fecha, operario, accion: a.accion, hora: a.hora,
        ts: buildTs(fecha, a.hora), lat: IPAR_LAT.toString(), lng: IPAR_LNG.toString(),
      }));
      const insRes = await fetch(`${SUPABASE_URL}/rest/v1/fichajes`, {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify(payload)
      });
      if (!insRes.ok) throw new Error(await insRes.text());
    }

    showMsg('success', `✔ Fichaje guardado correctamente para <strong>${operario}</strong> el <strong>${fecha}</strong>`);
    document.getElementById('btn-guardar-txt').textContent = '✔ Guardado';

    // Recargar datos tras 1.5s y cerrar modal
    setTimeout(() => {
      cerrarModal();
      cargarDatos();
    }, 1500);

  } catch(e) {
    showMsg('error', `⚠ Error al guardar: ${e.message}`);
  } finally {
    btn.disabled = false;
    document.getElementById('btn-guardar-txt').textContent = modalMode === 'editar' ? '✔ Actualizar fichaje' : '💾 Guardar fichaje';
  }
}
</script>
</body>
</html>
